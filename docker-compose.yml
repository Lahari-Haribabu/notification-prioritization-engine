version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: npe
      POSTGRES_PASSWORD: npe
      POSTGRES_DB: npe_db
    ports:
      - "5432:5432"

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://npe:npe@db:5432/npe_db
    ports:
      - "8000:8000"